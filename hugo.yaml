# Hugo configuration file
title: Diego Ripley

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

# Do not inject generator meta tag on homepage
disableHugoGeneratorInject: true 

# Parse Git commit
enableGitInfo: true

enableInlineShortcodes: true
enableEmoji: true

outputs:
  home: [html, rss]
  page: [html, rss, markdown]
  rss: [rss]
  section: [html, rss, markdown]
  taxonomy: [html, rss]
  term: [html, rss]

menu:
  main:
    - name: 📚 Resume
      url: /resume/
      weight: 1
    - name: Blog
      pageRef: /blog/
      params:
        type: link
        icon: rss
      weight: 2
    - name: Contact
      url: /contact/
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/diegoripley/www.diegoripley.ca"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: true

  theme:
    default: dark
    displayToggle: true
  
  search:
    flexsearch:
      tokenize: forward

  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "Monday, January 2, 2006 at 3:04 PM MST"

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: full
    contextMenu:
      enable: true
      links:
        - name: "Ask ChatGPT"
          url: "https://chatgpt.com/?q=Help+me+understand+the+content+in+this+url:+{url}+read+the+url+and+any+other+urls+referenced+on+the+page"
          icon: "sparkles"
        - name: "Ask Claude"
          url: "https://claude.ai/new?q=Help+me+understand+the+content+in+this+url:+{url}+read+the+url+and+any+other+urls+referenced+on+the+page"
          icon: "puzzle"
  
  footer:
    displayCopyright: false
    displayPoweredBy: false

  imageZoom:
    enable: true

  comments:
    enable: true
    type: giscus

    giscus:
      repo: diegoripley/www.diegoripley.ca
      repoId: R_kgDOO6vPXg
      category: General
      categoryId: DIC_kwDOO6vPXs4CrbL_

  editURL:
    enable: true
    base: "https://github.com/diegoripley/www.diegoripley.ca/edit/main/content"